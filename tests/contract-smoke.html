<!doctype html>
<html lang="en">
  <meta charset="utf-8">
  <title>Helm contract smoke test</title>
  <body>Running contract smoke test…</body>
  <script src="../validator.js"></script>
  <script>
    (async () => {
      const paths = ['research-dossier.html', 'decision-brief.html', 'reference-note.html', 'agent-handoff.html'];
      const results = await Promise.all(paths.map(async (path) => {
        const html = await (await fetch(`../templates/${path}`)).text();
        return { path, validation: window.HelmValidator.validate(html) };
      }));
      const failed = results.filter(({ validation }) => !validation.valid);
      const relativeSource = (await (await fetch('../templates/reference-note.html')).text())
        .replace('</main>', '<p><a href="../stage2/report.html">Stage two report</a></p><img src="./chart.png" alt="Chart"></main>');
      const relativeValidation = window.HelmValidator.validate(relativeSource);
      const gallerySource = await (await fetch('../authoring/component-gallery.html')).text();
      const galleryValidation = window.HelmValidator.validate(gallerySource);
      const issueCodes = new Set(relativeValidation.issues.map(({ code }) => code));
      const portabilityPassed = relativeValidation.score < 100
        && issueCodes.has('link-resource-local')
        && issueCodes.has('media-resource-local');
      document.body.dataset.status = failed.length || !portabilityPassed || !galleryValidation.valid || galleryValidation.issues.length ? 'failed' : 'passed';
      document.body.textContent = failed.length || !portabilityPassed || !galleryValidation.valid || galleryValidation.issues.length
        ? JSON.stringify({ failed, relativeValidation, galleryValidation })
        : 'passed';
    })().catch((error) => {
      document.body.dataset.status = 'failed';
      document.body.textContent = String(error);
    });
  </script>
</html>
